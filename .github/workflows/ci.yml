# .github/workflows/ci.yml
#
# LTSC continuous integration: every push and PR runs the same
# checks the release script runs locally. If a regression slips
# through, CI catches it before it reaches a release tag.
#
# Six jobs run in parallel on every event:
#
#   - rust:        fmt, clippy --pedantic -D warnings, tests
#   - swift:       swift-format --lint
#   - swift-tests: xcodebuild test against the COOL-TUNNEL scheme.
#                  Exercises the COOL-TUNNELTests target (regression
#                  coverage for H2/H3/M1 and future Swift unit tests).
#   - shellcheck:  every script under scripts/
#   - naive-pin:   bundled NaiveProxy binary matches naive.upstream.json
#                  (no network — just a SHA-256 compare; supply-chain
#                  audit against the moving upstream tag is the
#                  separate `naive-pin-audit.yml` workflow).
#   - try-ratchet: count of `try?` sites in the Swift production tree
#                  matches the committed cap (M1 robustness-review).
#                  Fast, no toolchain needed; runs on ubuntu.
#
# Macs are expensive on Actions, so we only build the universal
# binary on push to main and on tag pushes — PRs get a host-arch
# build for cycle time.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref. Saves runner time when
# someone force-pushes a fixup.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# **Shell-F#6 (v0.1.7.16):** least-privilege workflow permissions.
# Without an explicit `permissions:` block, jobs inherit the org
# default which can include `contents: write` and other broad
# scopes. None of these jobs need write access to anything.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Surface backtraces in test failures so CI logs are useful
  # without re-running locally.
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (build + clippy + test)
    runs-on: macos-14
    defaults:
      run:
        working-directory: core
    steps:
      # **Shell-F#6 (v0.1.7.16):** `persist-credentials: false`
      # so the GITHUB_TOKEN doesn't sit in `.git/config` after
      # checkout. A compromised dependency or test fixture
      # executed in a later step could otherwise read it.
      # **v2.0.22 (round-4 review):** action pinned to commit SHA
      # rather than the `v6` major-version tag. Tags are mutable —
      # a takeover or compromised retag of `actions/checkout@v6`
      # would silently substitute attacker code into every CI run
      # despite the `permissions: contents: read` + `persist-
      # credentials: false` controls. SHA pin is the supply-chain
      # discipline GitHub recommends; Dependabot's `package-
      # ecosystem: github-actions` updates the SHA on a real
      # release while preserving the version comment. Pinned SHAs
      # are the v6 / v5 / v2 release tags as of 2026-05-07.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      # rust-toolchain.toml is honoured automatically by rustup —
      # this step just makes sure rustup is present and up to date.
      - name: Install pinned toolchain
        run: |
          rustup show
          rustup component add rustfmt clippy
      - name: Cache cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy --pedantic -D warnings
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --locked --all-features
      # cargo-deny enforces the policy in `core/deny.toml`
      # (advisories-as-error, license allow-list, crates.io-only
      # source). Was policy-without-enforcement until v0.1.7.10:
      # `deny.toml` existed but no CI step ran it. Caching the
      # cargo-deny binary keeps the install fast.
      - name: Install cargo-deny
        # Third-party action: SHA pin is especially important here
        # since `taiki-e/install-action` runs `cargo install` on the
        # macos-14 runner with the GITHUB_TOKEN still in scope (until
        # the workflow's `permissions: contents: read` strips writes).
        uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3  # v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check
      - name: cargo build --locked --release (universal)
        if: github.event_name == 'push'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --locked --release --target aarch64-apple-darwin
          cargo build --locked --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/cool-tunnel-core \
            target/x86_64-apple-darwin/release/cool-tunnel-core \
            -output target/release/cool-tunnel-core-universal
          file target/release/cool-tunnel-core-universal

  swift:
    name: Swift (format lint)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: swift-format --lint
        # **v0.1.7.10:** hard-fail if swift-format isn't on PATH.
        # The previous soft-fail (`exit 0` when missing) silently
        # turned the job into a no-op on any runner that lacked
        # the tool — green CI without ever running the lint.
        # macos-14 GitHub-hosted runners ship swift-format with
        # Xcode; if a future runner image drops it, we want a
        # loud failure so we can reinstall it explicitly.
        #
        # **F8a (2026-05-05):** invoke via `xcrun` so the toolchain
        # binary is found regardless of PATH state on the runner.
        # The macos-14 runner has swift-format at
        # `Xcode.app/Contents/Developer/Toolchains/.../bin/swift-format`
        # but Xcode's toolchain bin is not on the default $PATH —
        # bare `swift-format` exited 127 ("command not found")
        # silently every run since the `--lint` step landed.
        # `xcrun` is the canonical macOS shim that resolves to
        # the active toolchain.
        #
        # Lints both the app sources (`COOL-TUNNEL/`) and the test
        # sources (`COOL-TUNNELTests/`) so the unit-test target stays
        # under the same style discipline.
        run: |
          xcrun swift-format lint -r --strict --configuration .swift-format COOL-TUNNEL
          xcrun swift-format lint -r --strict --configuration .swift-format COOL-TUNNELTests

  swift-tests:
    name: Swift (xcodebuild test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        # xcodebuild test triggers the COOL-TUNNEL target's
        # `Build Rust core` script phase, which shells out to
        # `cargo build`. Same toolchain pin as the rust job below.
        run: |
          rustup show
          rustup component add rustfmt clippy
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Cache cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-swift-tests-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-swift-tests-
            ${{ runner.os }}-cargo-
      - name: xcodebuild test
        run: |
          xcodebuild test \
            -project COOL-TUNNEL.xcodeproj \
            -scheme COOL-TUNNEL \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck scripts/*.sh
        run: shellcheck scripts/*.sh

  naive-pin:
    name: NaiveProxy pin verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      # Default mode is verify-only: no network, no lipo, no codesign.
      # Just SHA-256 of COOL-TUNNEL/naive vs `merged_universal_sha256`
      # in COOL-TUNNEL/naive.upstream.json. Catches:
      #   - a PR that edits the binary without updating the pin,
      #   - a PR that edits the pin without rolling the binary, or
      #   - any drift introduced by a botched merge.
      # The cross-check against the actual upstream tag lives in
      # naive-pin-audit.yml (scheduled, macOS, needs lipo + codesign).
      - name: Verify bundled naive matches naive.upstream.json
        run: bash scripts/fetch_naive.sh

  try-ratchet:
    name: try? ratchet (M1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      # `try?` swallows the underlying error without logging — for
      # credential stores and persistence paths that costs operators
      # the diagnostic signal needed to debug an incident (cf. H2/H3
      # in the 2026-05-11 robustness review). The standalone script
      # caps the count at a committed baseline and fails if it
      # drifts in either direction; the standalone form keeps the
      # CI step lightweight (no Swift toolchain, no Rust toolchain).
      - name: Enforce try? cap
        run: bash scripts/try_question_ratchet.sh
