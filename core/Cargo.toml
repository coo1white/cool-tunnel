[package]
name = "cool-tunnel-core"
version = "0.1.4"
edition = "2021"
rust-version = "1.80"
description = "Core engine for the COOL-TUNNEL macOS proxy client"
license = "AGPL-3.0-or-later"
publish = false

[lib]
name = "cool_tunnel_core"
path = "src/lib.rs"

[[bin]]
name = "cool-tunnel-core"
path = "src/main.rs"

[dependencies]
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "process",
    "io-util",
    "io-std",
    "sync",
    "time",
    "signal",
] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "test-util"] }

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
