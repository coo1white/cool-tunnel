# core/deny.toml
#
# cargo-deny policy. Run with:
#   cargo install cargo-deny
#   cargo deny --manifest-path core/Cargo.toml check
#
# LTSC-grade gates on the dependency tree:
#   - advisories: any RUSTSEC advisory on a transitive dep is a
#                 build-breaking error (not just a warning)
#   - bans:       no duplicate versions of the same crate (catches
#                 accidental forks pulled in via different deps)
#   - licenses:   only permissive open-source licences allowed
#   - sources:    only crates.io is a trusted source

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
# **v0.1.7.10:** bumped to `deny`. For an LTSC line where dep
# tree consistency matters (a duplicated crate version means
# two semver-incompatible copies of the same code reach
# production simultaneously), `warn` was the wrong default.
# If a legitimate duplicate appears later, allow-list it
# explicitly via `skip`.
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = []

[licenses]
version = 2
# Strict allow-list — only licences actually encountered in the
# current dep tree. Adding a new licence here is a deliberate
# review, not a side effect of a `cargo update`. The previous
# entries `BSD-2-Clause`, `ISC`, `MPL-2.0`, `Unicode-DFS-2016`,
# and `Zlib` were `unmatched license allowance` warnings (no
# crate in the tree carried them), so we drop them — a future
# transitive dep that pulls one of these in will now fail
# `cargo deny check` and force an explicit allow-list update,
# rather than slipping in unnoticed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
]
# Strict (was 0.93). `1.0` requires an exact match against the
# SPDX licence template — anything fuzzier (a crate with a
# hand-edited LICENSE file that drifts from the canonical text)
# fails the gate and forces the maintainer to either fix the
# upstream LICENSE or add a `[[licenses.exceptions]]` entry
# clarifying why the deviation is acceptable. Today's dep tree
# is uniformly mainstream crates (axum, tokio, serde, regex,
# tracing, hyper) with clean SPDX licences, so 1.0 is a free
# upgrade.
confidence-threshold = 1.0

# Our workspace crate declares `license = "AGPL-3.0-only"` (copyleft,
# not on the permissive `allow` list above). cargo-deny would
# otherwise reject our own publish=false crate; `[licenses.private]
# ignore = true` exempts it. Third-party deps still go through the
# full licence check on the `allow` list above.
[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
