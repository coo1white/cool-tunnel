# Pin the Rust toolchain so every build of cool-tunnel-core uses the
# same compiler — locally, in CI, in release packaging. LTSC posture:
# bumping this file is a deliberate, reviewed change, not a side
# effect of `rustup update`.
#
# The pinned channel matches `rust-version` in core/Cargo.toml so the
# MSRV declaration and the actual build version cannot drift apart.
#
# Bumping protocol:
#   1. Pick a stable Rust release at least 12 weeks old.
#   2. Update `channel` here AND `rust-version` in core/Cargo.toml.
#   3. Run scripts/build_rust_core.sh and scripts/security_check.sh.
#   4. Note the bump in CHANGELOG.md under the next release entry.

[toolchain]
channel = "1.80.0"
components = ["rustfmt", "clippy"]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]
profile = "minimal"
